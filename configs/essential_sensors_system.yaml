# Essential System Sensors Package (non-UPS)
# System monitoring sensors independent of UPS
# Use with: packages: !include configs/essential_sensors_system.yaml

sensor:
  - platform: uptime
    name: "Uptime"
    id: uptime_sensor
    update_interval: 60s

  - platform: wifi_signal
    name: "WiFi Signal"
    id: wifi_signal_sensor
    update_interval: 60s
    on_value:
      then:
        - if:
            condition:
              lambda: 'return x >= -60;'
            then:
              - light.turn_on:
                  id: status_led_${device_name}
                  red: 0%
                  green: 100%
                  blue: 0%
                  brightness: 30%
        - if:
            condition:
              lambda: 'return x >= -75 && x < -60;'
            then:
              - light.turn_on:
                  id: status_led_${device_name}
                  red: 100%
                  green: 50%
                  blue: 0%
                  brightness: 30%
        - if:
            condition:
              lambda: 'return x < -75;'
            then:
              - light.turn_on:
                  id: status_led_${device_name}
                  red: 100%
                  green: 0%
                  blue: 0%
                  brightness: 30%

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      id: ip_address

  - platform: version
    name: "ESPHome Version"
    id: esphome_version
