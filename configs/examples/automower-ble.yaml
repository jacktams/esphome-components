# Husqvarna / Flymo / Gardena Automower BLE Direct Control
#
# This config connects an ESP32 directly to the mower via BLE,
# handling the proprietary Husqvarna protocol on-device.
# No HA Bluetooth proxy or cloud integration needed.
#
# Supported mowers: Husqvarna Automower, Flymo EasiLife,
# Gardena SILENO, McCulloch Rob series.

esphome:
  name: bluetooth-proxy
  friendly_name: bluetooth-proxy

substitutions:
  device_name: bluetooth_proxy

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:
  level: DEBUG
  logs:
    automower_ble: DEBUG
    esp32_ble_client: DEBUG

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "Bluetooth-Proxy Fallback Hotspot"
    password: !secret ap_password

  on_connect:
    - light.turn_on:
        id: status_led_${device_name}
        red: 0%
        green: 100%
        blue: 0%
        brightness: 30%
        flash_length: 1000ms

  on_disconnect:
    - light.turn_on:
        id: status_led_${device_name}
        red: 100%
        green: 0%
        blue: 0%
        brightness: 50%

captive_portal:

external_components:
  - source:
      type: local
      path: components

light:
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    pin: GPIO48
    num_leds: 1
    chipset: WS2812
    name: "Status LED"
    id: status_led_${device_name}
    restore_mode: ALWAYS_OFF

# WiFi signal strength (existing)
sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    id: wifi_signal_strength_${device_name}
    update_interval: 10s
    on_value:
      then:
        - if:
            condition:
              lambda: 'return x >= -60;'
            then:
              - light.turn_on:
                  id: status_led_${device_name}
                  red: 0%
                  green: 100%
                  blue: 0%
                  brightness: 30%
        - if:
            condition:
              lambda: 'return x >= -75 && x < -60;'
            then:
              - light.turn_on:
                  id: status_led_${device_name}
                  red: 100%
                  green: 50%
                  blue: 0%
                  brightness: 30%
        - if:
            condition:
              lambda: 'return x < -75;'
            then:
              - light.turn_on:
                  id: status_led_${device_name}
                  red: 100%
                  green: 0%
                  blue: 0%
                  brightness: 30%

  # Mower battery level
  - platform: automower_ble
    automower_ble_id: mower
    battery_level:
      name: "Mower Battery"

# BLE setup
esp32_ble:
  max_connections: 4

esp32_ble_tracker:
  scan_parameters:
    active: true
    interval: 100ms
    window: 90ms
    continuous: true

ble_client:
  - mac_address: XX:XX:XX:XX:XX:XX  # <-- Your mower's MAC address
    id: mower_ble

# Keep the bluetooth proxy for other BLE devices
bluetooth_proxy:
  active: true

# Automower BLE component - handles the Husqvarna protocol directly
automower_ble:
  id: mower
  ble_client_id: mower_ble
  pin: 0000  # <-- Your mower's operator PIN (0 to skip)
  update_interval: 30s

# Mower state and activity
text_sensor:
  - platform: automower_ble
    automower_ble_id: mower
    state:
      name: "Mower State"
    activity:
      name: "Mower Activity"
    error:
      name: "Mower Error"

# Mower charging status and connectivity
binary_sensor:
  - platform: automower_ble
    automower_ble_id: mower
    charging:
      name: "Mower Charging"
    connected:
      name: "Mower Connected"

# Control buttons
button:
  - platform: automower_ble
    automower_ble_id: mower
    start:
      name: "Mower Start"
    pause:
      name: "Mower Pause"
    park:
      name: "Mower Park"
